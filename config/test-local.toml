# Test config for first run with Ollama direct
# Uses small models to minimize VRAM pressure

[game]
name = "test-local"
rounds = 1
turn_limit = 2
score_threshold = 10
phase_advance_score = 7.5

[draft]
picks_per_team = 3
style = "snake"

[teams.red]
name = "Red Team"
model = "http://localhost:11434/v1"
model_name = "qwen3:4b"
temperature = 0.8
timeout = 30.0

[teams.blue]
name = "Blue Team"
model = "http://localhost:11434/v1"
model_name = "qwen3:4b"
temperature = 0.4
timeout = 30.0

[teams.judge]
name = "Judge"
model = "http://localhost:11434/v1"
model_name = "qwen3:4b"
temperature = 0.2
timeout = 30.0

[crawler]
enabled = false
sources = []
refresh_interval = "24h"

[output.vault]
enabled = true
path = "~/OpenClaw-Vault/WarGames"

[output.database]
path = "~/.local/share/wargames/state.db"

[scoring]
profile = "balanced"
