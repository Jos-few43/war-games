# Tournament mode preset with loadouts and cost tracking.

[game]
name = "tournament-01"
rounds = 5
turn_limit = 4
score_threshold = 10
phase_advance_score = 7.5

[draft]
picks_per_team = 3
style = "snake"

[teams.red]
name = "Red Team"
model = "http://localhost:4003"
model_name = "llama-3-70b"
fallback_model = "http://localhost:11434/v1"
fallback_model_name = "qwen3:4b"
temperature = 0.8
timeout = 60.0
api_key = "$LITELLM_MASTER_KEY"
loadout = "aggressive"

[teams.blue]
name = "Blue Team"
model = "http://localhost:4003"
model_name = "llama-3-70b"
fallback_model = "http://localhost:11434/v1"
fallback_model_name = "qwen3:4b"
temperature = 0.4
timeout = 60.0
api_key = "$LITELLM_MASTER_KEY"
loadout = "defensive"

[teams.judge]
name = "Judge"
model = "http://localhost:4003"
model_name = "llama-3-70b"
fallback_model = "http://localhost:11434/v1"
fallback_model_name = "qwen3:4b"
temperature = 0.2
timeout = 90.0
api_key = "$LITELLM_MASTER_KEY"

[crawler]
enabled = true
sources = ["nvd", "exploitdb"]
refresh_interval = "24h"

[costs]
"llama-3-70b" = 0.00059
"qwen3:4b" = 0.0

[output.vault]
enabled = true
path = "~/OpenClaw-Vault/WarGames"

[output.database]
path = "~/.local/share/wargames/state.db"
