# All teams use free cloud models via OpenRouter
# Uses openrouter/free meta-model for auto-routing to available capacity
# No API costs — all models are free tier on OpenRouter

[game]
name = "season-cloud-free"
rounds = 3
turn_limit = 4
score_threshold = 10
phase_advance_score = 7.5

[draft]
picks_per_team = 3
style = "snake"

[teams.red]
name = "Red Team"
model = "https://openrouter.ai/api/v1"
model_name = "openrouter/free"
temperature = 0.8
timeout = 120.0
api_key = "$OPENROUTER_API_KEY"

[teams.blue]
name = "Blue Team"
model = "https://openrouter.ai/api/v1"
model_name = "openrouter/free"
temperature = 0.4
timeout = 120.0
api_key = "$OPENROUTER_API_KEY"

[teams.judge]
name = "Judge"
model = "https://openrouter.ai/api/v1"
model_name = "openrouter/free"
temperature = 0.2
timeout = 120.0
api_key = "$OPENROUTER_API_KEY"

[crawler]
enabled = false
sources = []
refresh_interval = "24h"

[output.vault]
enabled = true
path = "~/OpenClaw-Vault/WarGames"

[output.database]
path = "~/.local/share/wargames/state.db"
