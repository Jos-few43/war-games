# All teams use cloud models via LiteLLM green (port 4002)
# Maximum quality, higher API cost

[game]
name = "season-full-cloud"
rounds = 10
turn_limit = 8
score_threshold = 10
phase_advance_score = 7.5

[draft]
picks_per_team = 5
style = "snake"

[teams.red]
name = "Red Team"
model = "http://localhost:4002/v1"
model_name = "claude-sonnet-4-5"
temperature = 0.8

[teams.blue]
name = "Blue Team"
model = "http://localhost:4002/v1"
model_name = "claude-haiku-4-5"
temperature = 0.4

[teams.judge]
name = "Judge"
model = "http://localhost:4002/v1"
model_name = "claude-sonnet-4-5"
temperature = 0.2

[crawler]
enabled = true
sources = ["nvd", "exploitdb"]
refresh_interval = "24h"

[output.vault]
enabled = true
path = "~/OpenClaw-Vault/WarGames"

[output.database]
path = "~/.local/share/wargames/state.db"
