[game]
name = "season-01"
rounds = 50
turn_limit = 12
score_threshold = 10
phase_advance_score = 7.5

[draft]
picks_per_team = 5
style = "snake"

[teams.red]
name = "Red Team"
model = "http://localhost:4000/v1"
model_name = "qwen3-8b"
temperature = 0.8

[teams.blue]
name = "Blue Team"
model = "http://localhost:4000/v1"
model_name = "llama3.2-3b"
temperature = 0.4

[teams.judge]
name = "Judge"
model = "http://localhost:4002/v1"
model_name = "claude-sonnet-4-5"
temperature = 0.2

[crawler]
enabled = true
sources = ["nvd", "exploitdb", "ghsa"]
refresh_interval = "24h"

[output.vault]
enabled = true
path = "~/OpenClaw-Vault/WarGames"

[output.database]
path = "~/.local/share/wargames/state.db"

[scoring]
profile = "balanced"
