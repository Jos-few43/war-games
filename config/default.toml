[game]
name = "test-season"
rounds = 10
turn_limit = 6
score_threshold = 8
phase_advance_score = 5.0

[draft]
picks_per_team = 3
style = "snake"

[teams.red]
name = "Red Team"
model = "http://localhost:11434/v1"
model_name = "mistral-nemo:latest"
temperature = 0.8
timeout = 30.0

[teams.blue]
name = "Blue Team"
model = "http://localhost:11434/v1"
model_name = "deepseek-coder:6.7b"
temperature = 0.4
timeout = 30.0

[teams.judge]
name = "Judge"
model = "http://localhost:11434/v1"
model_name = "mistral-nemo:latest"
temperature = 0.2
timeout = 60.0

[crawler]
enabled = false

[output.vault]
enabled = false
path = "~/OpenClaw-Vault/WarGames"

[output.database]
path = "~/.local/share/wargames/test-state.db"

[scoring]
profile = "balanced"
