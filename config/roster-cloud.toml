# Cloud tournament roster — 4 models competing via OpenRouter
# Uses affordable models to keep costs ~$0.10-0.20 total
# Usage: wargames tournament --roster config/roster-cloud.toml

[tournament]
name = "cloud-showdown-01"
rounds = 2           # Swiss rounds (ceil(log2(4)) = 2 for 4 players)
games_per_match = 1  # 1 game per match to keep costs down
game_rounds = 2      # 2 rounds per game
turn_limit = 4
score_threshold = 10

[[models]]
name = "llama-3.1-70b"
endpoint = "https://openrouter.ai/api/v1"
model_name = "meta-llama/llama-3.1-70b-instruct"
api_key = "$OPENROUTER_API_KEY"
timeout = 120.0

[[models]]
name = "gemini-flash"
endpoint = "https://openrouter.ai/api/v1"
model_name = "google/gemini-2.0-flash-001"
api_key = "$OPENROUTER_API_KEY"
timeout = 120.0

[[models]]
name = "qwen-2.5-72b"
endpoint = "https://openrouter.ai/api/v1"
model_name = "qwen/qwen-2.5-72b-instruct"
api_key = "$OPENROUTER_API_KEY"
timeout = 120.0

[[models]]
name = "mistral-large"
endpoint = "https://openrouter.ai/api/v1"
model_name = "mistralai/mistral-large-2411"
api_key = "$OPENROUTER_API_KEY"
timeout = 120.0
