# Usage: wargames tournament --roster config/roster-cloud.toml

[tournament]
name = "cloud-tournament"
rounds = 2
games_per_match = 1
game_rounds = 1
turn_limit = 2
score_threshold = 8

# Global API key for LiteLLM green auth
api_key = "$LITELLM_MASTER_KEY"

[[models]]
name = "gemini-flash"
endpoint = "http://127.0.0.1:4002/v1"
model_name = "gemini-flash"

[[models]]
name = "gemini-2-flash"
endpoint = "http://127.0.0.1:4002/v1"
model_name = "gemini-2-flash"

[[models]]
name = "llama-3-70b"
endpoint = "http://127.0.0.1:4002/v1"
model_name = "llama-3-70b"

[[models]]
name = "llama-groq"
endpoint = "http://127.0.0.1:4002/v1"
model_name = "llama-3-70b-groq"
