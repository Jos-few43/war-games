# Minimal local tournament roster - 1 round, 1 game per match
# Usage: wargames tournament --roster config/roster-mini.toml

[tournament]
name = "mini-tournament"
rounds = 1
games_per_match = 1
game_rounds = 1
turn_limit = 2
score_threshold = 5

[[models]]
name = "mistral-nemo"
endpoint = "http://localhost:11434/v1"
model_name = "mistral-nemo:latest"

[[models]]
name = "deepseek-coder"
endpoint = "http://localhost:11434/v1"
model_name = "deepseek-coder:6.7b"