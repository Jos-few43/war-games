# Multi-round test config for Ollama direct
# 3 rounds × 4 turns with qwen3:4b for better gameplay
# Single model avoids VRAM swap pressure on 6GB GPU

[game]
name = "test-multi-qwen3"
rounds = 3
turn_limit = 4
score_threshold = 12
phase_advance_score = 8.0

[draft]
picks_per_team = 3
style = "snake"

[teams.red]
name = "Red Team"
model = "http://localhost:11434/v1"
model_name = "qwen3:4b"
temperature = 0.8

[teams.blue]
name = "Blue Team"
model = "http://localhost:11434/v1"
model_name = "qwen3:4b"
temperature = 0.4

[teams.judge]
name = "Judge"
model = "http://localhost:11434/v1"
model_name = "qwen3:4b"
temperature = 0.2

[crawler]
enabled = false
sources = []
refresh_interval = "24h"

[output.vault]
enabled = true
path = "~/OpenClaw-Vault/WarGames"

[output.database]
path = "~/.local/share/wargames/state.db"
